<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i2 Energy — O&M Job Order Log</title>
<style>
  :root{
    --navy:#14284B;
    --navy-soft:#1E3A66;
    --teal:#0E7C7B;
    --teal-soft:#E0F2F1;
    --bg:#F0F2F5;
    --panel:#FFFFFF;
    --ink:#1B2430;
    --ink-soft:#5B6675;
    --line:#D8DDE4;
    --amber:#B4740E;
    --amber-soft:#FBF0DC;
    --green:#227A4D;
    --green-soft:#E3F3E9;
    --red:#B7302B;
    --red-soft:#FBE7E6;
    --slate:#5B6675;
    --slate-soft:#E9EBEE;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:'Consolas','Liberation Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px}

  /* ===== Header ===== */
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header .brand{font-weight:700;font-size:17px;letter-spacing:.3px}
  header .brand span{color:#7FD1D0;font-weight:500}
  header .spacer{flex:1}
  .btn{border:0;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:#0A6362}
  .btn-ghost{background:transparent;color:#C9D4E4;border:1px solid #3B527D}
  .btn-ghost:hover{background:var(--navy-soft)}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-quiet{background:var(--slate-soft);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ===== Status bar ===== */
  #statusBar{padding:8px 18px;font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  #statusBar .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
  #statusBar.err .dot{background:var(--red)}

  /* ===== Board ===== */
  #board{display:flex;gap:12px;padding:0 18px 30px;overflow-x:auto;align-items:flex-start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:12px;min-width:270px;width:270px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 170px)}
  .col-head{padding:12px 14px;border-bottom:2px solid var(--line);font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--panel);border-radius:12px 12px 0 0}
  .col-head .count{margin-left:auto;background:var(--slate-soft);color:var(--ink-soft);border-radius:10px;padding:1px 9px;font-size:12px}
  .col-body{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:60px}
  .col[data-status="New"] .col-head{border-bottom-color:var(--teal)}
  .col[data-status="In Progress"] .col-head{border-bottom-color:var(--amber)}
  .col[data-status="On Hold"] .col-head{border-bottom-color:var(--slate)}
  .col[data-status="Completed"] .col-head{border-bottom-color:var(--green)}
  .col[data-status="Cancelled"] .col-head{border-bottom-color:var(--red)}

  .card{border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;background:#fff}
  .card:hover{border-color:var(--teal);box-shadow:0 2px 6px rgba(20,40,75,.10)}
  .card .tno{font-family:var(--mono);font-size:12.5px;color:var(--navy);font-weight:700}
  .card .site{font-weight:600;margin:4px 0 2px;font-size:14px}
  .card .desc{color:var(--ink-soft);font-size:13px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .tag{font-size:11.5px;border-radius:6px;padding:2px 7px;font-weight:600}
  .tag-assignee{background:var(--teal-soft);color:var(--teal)}
  .tag-priority-High{background:var(--amber-soft);color:var(--amber)}
  .tag-priority-Urgent{background:var(--red-soft);color:var(--red)}
  .tag-overdue{background:var(--red);color:#fff}
  .tag-due{background:var(--slate-soft);color:var(--ink-soft)}
  .empty-col{color:var(--ink-soft);font-size:13px;text-align:center;padding:14px 6px}

  /* ===== Modal ===== */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.55);display:none;align-items:flex-start;justify-content:center;padding:24px 12px;overflow-y:auto;z-index:50}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;padding:20px}
  .modal h2{margin:0 0 4px;font-size:18px;color:var(--navy)}
  .modal .sub{color:var(--ink-soft);font-size:13px;margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin:12px 0 4px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;font-family:var(--sans);background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);border-color:var(--teal)}
  textarea{resize:vertical;min-height:70px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap}
  .req::after{content:" *";color:var(--red)}

  /* remarks */
  .remarks{margin-top:14px;border-top:1px solid var(--line);padding-top:10px}
  .remark{padding:8px 10px;border-left:3px solid var(--teal);background:var(--bg);border-radius:0 8px 8px 0;margin-bottom:8px}
  .remark .rmeta{font-size:11.5px;color:var(--ink-soft);margin-bottom:2px;font-family:var(--mono)}
  .remark .rtext{font-size:13.5px}
  .addremark{display:flex;gap:8px;margin-top:8px}
  .addremark input{flex:1}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;display:none;z-index:99;max-width:92vw}
  .toast.show{display:block}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}

  @media (max-width:640px){
    header .brand{font-size:15px}
    .col{min-width:82vw;width:82vw}
    .row2{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div class="brand">i2 ENERGY <span>| O&amp;M Job Order Log</span></div>
  <div class="spacer"></div>
  <button class="btn btn-ghost" id="btnRefresh" onclick="loadJobs()">Refresh</button>
  <button class="btn btn-teal" onclick="openNewJob()">+ New Job Order</button>
</header>

<div id="statusBar"><span class="dot"></span><span id="statusText">Loading…</span></div>

<div id="board"></div>

<!-- ===== New Job modal ===== -->
<div class="overlay" id="newJobOverlay">
  <div class="modal">
    <h2>New Job Order</h2>
    <div class="sub">Ticket number is generated automatically when saved.</div>

    <div class="row2">
      <div>
        <label class="req">Intake Channel</label>
        <select id="njChannel">
          <option>Verbal</option><option>Phone</option><option>Text/WhatsApp</option>
          <option>Email</option><option>Walk-in</option><option>Radio</option>
        </select>
      </div>
      <div>
        <label class="req">Site / Location</label>
        <input id="njSite" placeholder="e.g. Plant A - Inverter 3">
      </div>
    </div>

    <label class="req">Job Description</label>
    <textarea id="njDesc" placeholder="What was reported? What needs to be done?"></textarea>

    <div class="row2">
      <div>
        <label>Reported By</label>
        <input id="njReportedBy" placeholder="Who reported the issue">
      </div>
      <div>
        <label class="req">Received By (you)</label>
        <input id="njReceivedBy" placeholder="Your name">
      </div>
    </div>

    <div class="row2">
      <div>
        <label>Assign To</label>
        <select id="njAssigned"></select>
      </div>
      <div>
        <label>Priority</label>
        <select id="njPriority">
          <option>Low</option><option selected>Normal</option><option>High</option><option>Urgent</option>
        </select>
      </div>
    </div>

    <label>Due Date</label>
    <input type="date" id="njDue">

    <div class="modal-actions">
      <button class="btn btn-quiet" onclick="closeNewJob()">Cancel</button>
      <button class="btn btn-teal" id="btnSaveJob" onclick="saveNewJob()">Save Job Order</button>
    </div>
  </div>
</div>

<!-- ===== Detail modal ===== -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <h2 id="dTicket" style="font-family:var(--mono)"></h2>
    <div class="sub" id="dCreated"></div>

    <div style="font-size:14px"><b id="dSite"></b></div>
    <div style="font-size:13.5px;color:var(--ink-soft);margin-top:4px" id="dDesc"></div>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-top:6px" id="dPeople"></div>

    <div class="row2">
      <div>
        <label>Status</label>
        <select id="dStatus">
          <option>New</option><option>In Progress</option><option>On Hold</option>
          <option>Completed</option><option>Cancelled</option>
        </select>
      </div>
      <div>
        <label>Assigned To</label>
        <select id="dAssigned"></select>
      </div>
    </div>
    <div class="row2">
      <div>
        <label>Priority</label>
        <select id="dPriority">
          <option>Low</option><option>Normal</option><option>High</option><option>Urgent</option>
        </select>
      </div>
      <div>
        <label>Due Date</label>
        <input type="date" id="dDue">
      </div>
    </div>

    <div class="remarks">
      <label style="margin-top:0">Remarks Log</label>
      <div id="dRemarks"></div>
      <div class="addremark">
        <input id="dNewRemark" placeholder="Add a remark…">
        <button class="btn btn-navy" onclick="submitRemark()">Add</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-quiet" onclick="closeDetail()">Close</button>
      <button class="btn btn-teal" id="btnSaveChanges" onclick="saveChanges()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= CONFIGURATION ================= */
var API_URL = 'https://script.google.com/macros/s/AKfycbzu0PYjJG9bO09UOyIs9Tr9Zg4iSkIgFFTatzpBYTp6LiG_1VtBWHPH2LMLqBtZ1EwO/exec';

var TEAM = ['', 'Eizuddin', 'Runa', 'Ridhwan', 'Azfar', 'Supervisor'];
var STATUSES = ['New', 'In Progress', 'On Hold', 'Completed', 'Cancelled'];
/* ================================================= */

var allJobs = [];
var allRemarks = [];
var currentTicket = null;

/* ---------- Load & render ---------- */
function loadJobs(){
  setStatus('Loading…', false);
  var btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  fetch(API_URL + '?action=getJobs')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.status !== 'ok') throw new Error(data.message || 'API error');
      allJobs = data.jobs || [];
      allRemarks = data.remarks || [];
      renderBoard();
      setStatus('Live · ' + allJobs.length + ' job order(s) · updated ' + timeNow(), false);
    })
    .catch(function(err){
      setStatus('Cannot reach the server. Check internet connection, then press Refresh. (' + err.message + ')', true);
    })
    .finally(function(){ btn.disabled = false; });
}

function renderBoard(){
  var board = document.getElementById('board');
  board.innerHTML = '';
  STATUSES.forEach(function(st){
    var jobs = allJobs.filter(function(j){ return (j.Status || 'New') === st; });
    // newest first
    jobs.sort(function(a,b){ return String(b.CreatedAt).localeCompare(String(a.CreatedAt)); });

    var col = document.createElement('div');
    col.className = 'col';
    col.setAttribute('data-status', st);

    var head = document.createElement('div');
    head.className = 'col-head';
    head.innerHTML = st + '<span class="count">' + jobs.length + '</span>';
    col.appendChild(head);

    var body = document.createElement('div');
    body.className = 'col-body';

    if(jobs.length === 0){
      body.innerHTML = '<div class="empty-col">No jobs here</div>';
    }
    jobs.forEach(function(j){ body.appendChild(makeCard(j)); });

    col.appendChild(body);
    board.appendChild(col);
  });
}

function makeCard(j){
  var card = document.createElement('div');
  card.className = 'card';
  card.onclick = function(){ openDetail(j.TicketNo); };

  var overdue = isOverdue(j);
  var tags = '';
  if(overdue) tags += '<span class="tag tag-overdue">OVERDUE</span>';
  if(j.AssignedTo) tags += '<span class="tag tag-assignee">' + esc(j.AssignedTo) + '</span>';
  if(j.Priority === 'High' || j.Priority === 'Urgent')
    tags += '<span class="tag tag-priority-' + j.Priority + '">' + j.Priority + '</span>';
  if(j.DueDate) tags += '<span class="tag tag-due">Due ' + fmtDate(j.DueDate) + '</span>';

  card.innerHTML =
    '<div class="tno">' + esc(j.TicketNo) + '</div>' +
    '<div class="site">' + esc(j.Site || '(no site)') + '</div>' +
    '<div class="desc">' + esc(j.Description || '') + '</div>' +
    (tags ? '<div class="meta">' + tags + '</div>' : '');
  return card;
}

function isOverdue(j){
  if(!j.DueDate) return false;
  if(j.Status === 'Completed' || j.Status === 'Cancelled') return false;
  var due = new Date(j.DueDate);
  var today = new Date(); today.setHours(0,0,0,0);
  return due < today;
}

/* ---------- New Job ---------- */
function openNewJob(){
  fillTeamSelect('njAssigned');
  // restore saved "Received By" name
  try{ document.getElementById('njReceivedBy').value = localStorage.getItem('om_receivedBy') || ''; }catch(e){}
  document.getElementById('newJobOverlay').classList.add('open');
}
function closeNewJob(){ document.getElementById('newJobOverlay').classList.remove('open'); }

function saveNewJob(){
  var site = val('njSite'), desc = val('njDesc'), recBy = val('njReceivedBy');
  if(!site || !desc || !recBy){ toast('Please fill Site, Description and Received By.'); return; }

  try{ localStorage.setItem('om_receivedBy', recBy); }catch(e){}

  var btn = document.getElementById('btnSaveJob');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Saving…';

  apiPost({
    action: 'addJob',
    job: {
      Channel: val('njChannel'), Site: site, Description: desc,
      ReportedBy: val('njReportedBy'), ReceivedBy: recBy,
      AssignedTo: val('njAssigned'), Priority: val('njPriority'),
      Status: 'New', DueDate: val('njDue')
    }
  }, function(data){
    btn.disabled = false; btn.textContent = 'Save Job Order';
    if(data.status === 'ok'){
      closeNewJob(); clearNewJobForm();
      toast('Saved. Ticket: ' + data.ticketNo);
      loadJobs();
    } else toast('Error: ' + data.message);
  }, function(err){
    btn.disabled = false; btn.textContent = 'Save Job Order';
    toast('Could not save: ' + err.message);
  });
}

function clearNewJobForm(){
  ['njSite','njDesc','njReportedBy','njDue'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('njPriority').value = 'Normal';
  document.getElementById('njAssigned').value = '';
}

/* ---------- Detail ---------- */
function openDetail(ticketNo){
  var j = allJobs.find(function(x){ return x.TicketNo === ticketNo; });
  if(!j) return;
  currentTicket = ticketNo;

  document.getElementById('dTicket').textContent = j.TicketNo;
  document.getElementById('dCreated').textContent =
    'Created ' + fmtDateTime(j.CreatedAt) + ' via ' + (j.Channel || '—');
  document.getElementById('dSite').textContent = j.Site || '(no site)';
  document.getElementById('dDesc').textContent = j.Description || '';
  document.getElementById('dPeople').textContent =
    'Reported by: ' + (j.ReportedBy || '—') + '  ·  Received by: ' + (j.ReceivedBy || '—');

  fillTeamSelect('dAssigned');
  document.getElementById('dStatus').value = j.Status || 'New';
  document.getElementById('dAssigned').value = j.AssignedTo || '';
  document.getElementById('dPriority').value = j.Priority || 'Normal';
  document.getElementById('dDue').value = j.DueDate ? String(j.DueDate).substring(0,10) : '';

  renderRemarks(ticketNo);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); currentTicket = null; }

function renderRemarks(ticketNo){
  var list = allRemarks.filter(function(r){ return r.TicketNo === ticketNo; });
  list.sort(function(a,b){ return String(a.Timestamp).localeCompare(String(b.Timestamp)); });
  var html = list.map(function(r){
    return '<div class="remark"><div class="rmeta">' + fmtDateTime(r.Timestamp) +
           (r.By ? ' — ' + esc(r.By) : '') + '</div><div class="rtext">' + esc(r.Remark) + '</div></div>';
  }).join('');
  document.getElementById('dRemarks').innerHTML = html || '<div class="empty-col">No remarks yet</div>';
}

function saveChanges(){
  if(!currentTicket) return;
  var btn = document.getElementById('btnSaveChanges');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Saving…';

  apiPost({
    action: 'updateJob',
    ticketNo: currentTicket,
    updates: {
      Status: val('dStatus'), AssignedTo: val('dAssigned'),
      Priority: val('dPriority'), DueDate: val('dDue')
    }
  }, function(data){
    btn.disabled = false; btn.textContent = 'Save Changes';
    if(data.status === 'ok'){ closeDetail(); toast('Updated ' + currentTicket); loadJobs(); }
    else toast('Error: ' + data.message);
  }, function(err){
    btn.disabled = false; btn.textContent = 'Save Changes';
    toast('Could not save: ' + err.message);
  });
}

function submitRemark(){
  if(!currentTicket) return;
  var text = val('dNewRemark');
  if(!text){ toast('Type a remark first.'); return; }
  var by = '';
  try{ by = localStorage.getItem('om_receivedBy') || ''; }catch(e){}

  apiPost({ action:'addRemark', ticketNo: currentTicket, by: by, remark: text },
  function(data){
    if(data.status === 'ok'){
      document.getElementById('dNewRemark').value = '';
      allRemarks.push({TicketNo: currentTicket, Timestamp: new Date().toISOString(), By: by, Remark: text});
      renderRemarks(currentTicket);
      toast('Remark added');
    } else toast('Error: ' + data.message);
  },
  function(err){ toast('Could not add remark: ' + err.message); });
}

/* ---------- helpers ---------- */
function apiPost(payload, onOk, onErr){
  fetch(API_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(onOk)
    .catch(onErr);
}
function fillTeamSelect(id){
  var sel = document.getElementById(id);
  sel.innerHTML = TEAM.map(function(t){
    return '<option value="' + t + '">' + (t || '— Unassigned —') + '</option>';
  }).join('');
}
function val(id){ return document.getElementById(id).value.trim(); }
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d){
  var x = new Date(d); if(isNaN(x)) return String(d);
  return x.toLocaleDateString('en-MY', {day:'numeric', month:'short'});
}
function fmtDateTime(d){
  var x = new Date(d); if(isNaN(x)) return String(d);
  return x.toLocaleString('en-MY', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function timeNow(){ return new Date().toLocaleTimeString('en-MY', {hour:'2-digit', minute:'2-digit'}); }
function setStatus(msg, isErr){
  var bar = document.getElementById('statusBar');
  bar.className = isErr ? 'err' : '';
  document.getElementById('statusText').textContent = msg;
}
var toastTimer = null;
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

/* close modals on backdrop click */
document.getElementById('newJobOverlay').addEventListener('click', function(e){ if(e.target === this) closeNewJob(); });
document.getElementById('detailOverlay').addEventListener('click', function(e){ if(e.target === this) closeDetail(); });

/* auto-refresh every 2 minutes */
setInterval(loadJobs, 120000);

loadJobs();
</script>
</body>
</html>
